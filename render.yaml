services:
  - type: web
    name: glint-key-api
    runtime: python
    buildCommand: pip install fastapi uvicorn
    startCommand: python3 -m uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GLINT_ADMIN_KEY
        value: CHANGE_THIS_TO_YOUR_SECRET_KEY
      - key: PYTHON_VERSION
        value: 3.12.7
