services:
  - type: web
    name: glint-key-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app --bind 0.0.0.0:$PORT
    envVars:
      - key: GLINT_ADMIN_KEY
        value: CHANGE_THIS_TO_YOUR_SECRET_KEY
      - key: PYTHON_VERSION
        value: 3.12.7
